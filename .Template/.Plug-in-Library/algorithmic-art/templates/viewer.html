<!DOCTYPE html>
<!--
    [viewer.html] 알고리즘 아트 뷰어 템플릿
    =========================================
    이 파일은 모든 아트워크의 시작점입니다. 매번 이 파일을 복사하여 수정하세요.

    [유지할 것 — 절대 변경 금지]
    ✓ 전체 레이아웃 구조 (헤더, 사이드바, 메인 캔버스 영역)
    ✓ Anthropic 브랜딩 (색상, 폰트, 레이아웃)
    ✓ 시드 탐색 섹션 (항상 포함)
    ✓ 자체 완결형 아티팩트 구조 (모든 것 인라인)

    [창의적으로 수정할 것]
    ✗ p5.js 알고리즘 (나만의 비전 구현)
    ✗ 파라미터 (아트에 필요한 것 정의)
    ✗ UI 컨트롤 (파라미터에 맞게 커스터마이즈)

    철학이 구현을 안내하도록 하세요.
    세상은 당신의 무대입니다 — 창의적으로!
-->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제너러티브 아트 뷰어</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Anthropic 브랜드 색상 */
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* 사이드바 */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* 컨트롤 섹션 */
        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        /* 시드 컨트롤 */
        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        /* 파라미터 컨트롤 */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        /* 컬러 피커 */
        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        /* 버튼 */
        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        /* 캔버스 영역 */
        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        /* 로딩 상태 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        /* 반응형 — 모바일에서 세로 배치 */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 컨트롤 사이드바 -->
        <div class="sidebar">
            <!-- 헤더 (아트워크에 맞게 수정하세요) -->
            <h1>제목 - 수정하세요</h1>
            <div class="subtitle">부제목 - 수정하세요</div>

            <!-- 시드 섹션 (항상 유지) -->
            <div class="control-section">
                <h3>시드</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← 이전</button>
                    <button class="button secondary" onclick="nextSeed()">다음 →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ 무작위</button>
            </div>

            <!-- 파라미터 섹션 (아트워크에 맞게 수정하세요) -->
            <div class="control-section">
                <h3>파라미터</h3>

                <!-- 파티클 수 -->
                <div class="control-group">
                    <label>파티클 수</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="1000" max="10000" step="500" value="5000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">5000</span>
                    </div>
                </div>

                <!-- 플로우 속도 -->
                <div class="control-group">
                    <label>플로우 속도</label>
                    <div class="slider-container">
                        <input type="range" id="flowSpeed" min="0.1" max="2.0" step="0.1" value="0.5" oninput="updateParam('flowSpeed', this.value)">
                        <span class="value-display" id="flowSpeed-value">0.5</span>
                    </div>
                </div>

                <!-- 노이즈 스케일 -->
                <div class="control-group">
                    <label>노이즈 스케일</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.02" step="0.001" value="0.005" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.005</span>
                    </div>
                </div>

                <!-- 흔적 길이 -->
                <div class="control-group">
                    <label>흔적 길이</label>
                    <div class="slider-container">
                        <input type="range" id="trailLength" min="2" max="20" step="1" value="8" oninput="updateParam('trailLength', this.value)">
                        <span class="value-display" id="trailLength-value">8</span>
                    </div>
                </div>
            </div>

            <!-- 색상 섹션 (선택 — 아트워크에 맞게 수정하거나 제거하세요) -->
            <div class="control-section">
                <h3>색상</h3>

                <!-- 색상 1 -->
                <div class="color-group">
                    <label>주요 색상</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#d97757" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#d97757</span>
                    </div>
                </div>

                <!-- 색상 2 -->
                <div class="color-group">
                    <label>보조 색상</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#6a9bcc" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#6a9bcc</span>
                    </div>
                </div>

                <!-- 색상 3 -->
                <div class="color-group">
                    <label>강조 색상</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#788c5d" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#788c5d</span>
                    </div>
                </div>
            </div>

            <!-- 액션 섹션 (항상 유지) -->
            <div class="control-section">
                <h3>액션</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">초기화</button>
                </div>
            </div>
        </div>

        <!-- 메인 캔버스 영역 -->
        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">제너러티브 아트 초기화 중...</div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // 제너러티브 아트 파라미터 — 알고리즘에 맞게 커스터마이즈하세요
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 12345,
            particleCount: 5000,
            flowSpeed: 0.5,
            noiseScale: 0.005,
            trailLength: 8,
            colorPalette: ['#d97757', '#6a9bcc', '#788c5d']
        };

        let defaultParams = {...params}; // 초기화 시 복원을 위한 기본값 보관

        // ═══════════════════════════════════════════════════════════════════════
        // p5.js 제너러티브 아트 알고리즘 — 나만의 비전으로 교체하세요
        // ═══════════════════════════════════════════════════════════════════════

        let particles = [];
        let flowField = [];
        let cols, rows;
        let scl = 10; // 플로우 필드 해상도

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');

            initializeSystem();

            // 로딩 메시지 숨기기
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            // 재현성을 위한 시드 기반 무작위성 초기화
            randomSeed(params.seed);
            noiseSeed(params.seed);

            // 파티클 초기화
            particles = [];

            // 파티클 생성
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle());
            }

            // 플로우 필드 크기 계산
            cols = floor(width / scl);
            rows = floor(height / scl);

            // 플로우 필드 생성
            generateFlowField();

            // 배경 초기화
            background(250, 249, 245); // Anthropic 밝은 배경색
        }

        function generateFlowField() {
          // 여기에 구현하세요
        }

        function draw() {

        }

        // ═══════════════════════════════════════════════════════════════════════
        // 파티클 시스템 — 알고리즘에 맞게 커스터마이즈하세요
        // ═══════════════════════════════════════════════════════════════════════

        class Particle {
            constructor() {
                // 여기에 구현하세요
            }
            // 여기에 구현하세요
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI 컨트롤 핸들러 — 파라미터에 맞게 커스터마이즈하세요
        // ═══════════════════════════════════════════════════════════════════════

        function updateParam(paramName, value) {
            // 여기에 구현하세요
        }

        function updateColor(colorId, value) {
            // 여기에 구현하세요
        }

        // ═══════════════════════════════════════════════════════════════════════
        // 시드 컨트롤 함수 — 항상 유지하세요
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                // 유효하지 않은 입력 시 현재 시드로 복원
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};

            // UI 슬라이더 값 동기화
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('flowSpeed').value = params.flowSpeed;
            document.getElementById('flowSpeed-value').textContent = params.flowSpeed;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('trailLength').value = params.trailLength;
            document.getElementById('trailLength-value').textContent = params.trailLength;

            // 색상 초기화
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];

            updateSeedDisplay();
            initializeSystem();
        }

        // 페이지 로드 시 UI 초기화
        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
